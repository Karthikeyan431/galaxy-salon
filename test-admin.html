<!-- Test version with mock data - for local testing only -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy Admin - TEST MODE</title>
  <style>
    /* Same styles as admin.html */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }
    .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-box { background: #16213e; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-box h1 { text-align: center; margin-bottom: 30px; color: #e94560; }
    .login-box input { width: 100%; padding: 14px; margin-bottom: 16px; border: 2px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #fff; font-size: 16px; }
    .login-box button { width: 100%; padding: 14px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .dashboard { display: none; }
    .dashboard.active { display: block; }
    .admin-header { background: #16213e; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .admin-header h1 { color: #e94560; font-size: 20px; }
    .admin-nav { background: #0f3460; padding: 0; display: flex; }
    .nav-btn { padding: 14px 24px; background: transparent; border: none; color: #fff; cursor: pointer; }
    .nav-btn.active { background: #e94560; }
    .admin-content { padding: 24px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card { background: #16213e; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card h2 { margin-bottom: 20px; color: #e94560; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; color: #aaa; }
    .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #fff; }
    .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .course-card { background: #0f3460; border-radius: 12px; overflow: hidden; }
    .course-card img { width: 100%; height: 140px; object-fit: cover; }
    .course-card-content { padding: 16px; }
    .course-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #0f3460; color: #fff; }
    .btn-danger { background: #ff4757; color: #fff; }
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 16px 24px; border-radius: 8px; background: #2ed573; display: none; }
    .toast.show { display: block; }
    .test-badge { background: #ff4757; color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 12px; margin-left: 12px; }
  </style>
</head>
<body>
  <div class="login-page" id="loginPage">
    <div class="login-box">
      <h1>🔐 Galaxy Admin <span class="test-badge">TEST</span></h1>
      <form id="loginForm">
        <input type="password" id="password" placeholder="Password (use: galaxy2026)" required>
        <button type="submit">Login</button>
      </form>
    </div>
  </div>

  <div class="dashboard" id="dashboard">
    <header class="admin-header">
      <h1>🔧 Galaxy Admin <span class="test-badge">TEST MODE</span></h1>
      <button class="btn btn-secondary" onclick="location.reload()">Logout</button>
    </header>
    <nav class="admin-nav">
      <button class="nav-btn active" data-tab="courses">Courses</button>
      <button class="nav-btn" data-tab="siteinfo">Site Info</button>
    </nav>
    <div class="admin-content">
      <div class="tab-content active" id="courses">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h2>Courses</h2>
            <button class="btn btn-primary" onclick="addCourse()">+ Add Course</button>
          </div>
          <div class="courses-grid" id="coursesGrid"></div>
        </div>
      </div>
      <div class="tab-content" id="siteinfo">
        <div class="card">
          <h2>Site Information</h2>
          <form id="siteForm">
            <div class="form-group">
              <label>Site Name</label>
              <input type="text" id="siteName">
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="text" id="sitePhone">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="siteEmail">
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Mock data - stored in memory for testing
    let courses = [
      { id: 1, title: "Professional Makeup Artistry", description: "Learn bridal, editorial, and professional makeup techniques", image: "images/Makeup Artistry.jpg", duration: "3 Months", price: "₹25,000" },
      { id: 2, title: "Hair Styling & Extensions", description: "Master hair cutting, coloring, styling, and extensions", image: "images/Hair Styling.jpeg", duration: "2 Months", price: "₹18,000" },
      { id: 3, title: "Skin Care & Aesthetics", description: "Professional skincare and aesthetic treatments", image: "images/Skin Care & Aesthetics.jpg", duration: "2 Months", price: "₹15,000" },
      { id: 4, title: "Nail Art & Extensions", description: "Creative nail art and professional nail care", image: "images/Nail Art & Extensions.jpeg", duration: "1 Month", price: "₹8,000" },
      { id: 5, title: "Cosmetology", description: "Comprehensive cosmetology program", image: "images/Cosmetology.webp", duration: "6 Months", price: "₹50,000" },
      { id: 6, title: "Salon Management", description: "Learn to manage a beauty salon", image: "images/Salon Management.avif", duration: "1 Month", price: "₹10,000" }
    ];
    
    let siteInfo = {
      name: "Galaxy Beauty Academy",
      phone: "+91-96776-94400",
      email: "saransaaro@gmail.com"
    };

    // Login
    document.getElementById('loginForm').onsubmit = (e) => {
      e.preventDefault();
      if (document.getElementById('password').value === 'galaxy2026') {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        renderCourses();
        loadSiteInfo();
      } else {
        showToast('Invalid password');
      }
    };

    function renderCourses() {
      const grid = document.getElementById('coursesGrid');
      grid.innerHTML = courses.map(c => `
        <div class="course-card">
          <img src="${c.image}" alt="${c.title}" onerror="this.src='https://placehold.co/400x300/e94560/fff?text=No+Image'">
          <div class="course-card-content">
            <h3 style="margin-bottom:8px;">${c.title}</h3>
            <p style="color:#aaa;font-size:13px;margin-bottom:8px;">${c.description}</p>
            <div style="color:#e94560;font-size:13px;">${c.duration} · ${c.price}</div>
            <div class="course-actions">
              <button class="btn btn-secondary" onclick="editCourse(${c.id})">Edit</button>
              <button class="btn btn-danger" onclick="deleteCourse(${c.id})">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function loadSiteInfo() {
      document.getElementById('siteName').value = siteInfo.name;
      document.getElementById('sitePhone').value = siteInfo.phone;
      document.getElementById('siteEmail').value = siteInfo.email;
    }

    document.getElementById('siteForm').onsubmit = (e) => {
      e.preventDefault();
      siteInfo.name = document.getElementById('siteName').value;
      siteInfo.phone = document.getElementById('sitePhone').value;
      siteInfo.email = document.getElementById('siteEmail').value;
      showToast('Saved! (stored in memory)');
    };

    function addCourse() {
      const title = prompt('Course title:');
      if (!title) return;
      const desc = prompt('Description:');
      const duration = prompt('Duration (e.g., 2 Months):');
      const price = prompt('Price (e.g., ₹15,000):');
      const newCourse = {
        id: Date.now(),
        title,
        description: desc || '',
        image: 'images/placeholder.jpg',
        duration: duration || '1 Month',
        price: price || '₹10,000'
      };
      courses.push(newCourse);
      renderCourses();
      showToast('Course added!');
    }

    function editCourse(id) {
      const course = courses.find(c => c.id === id);
      const newTitle = prompt('Title:', course.title);
      if (newTitle !== null) {
        course.title = newTitle;
        renderCourses();
        showToast('Course updated!');
      }
    }

    function deleteCourse(id) {
      if (confirm('Delete this course?')) {
        courses = courses.filter(c => c.id !== id);
        renderCourses();
        showToast('Course deleted!');
      }
    }

    // Nav
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      };
    });

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>

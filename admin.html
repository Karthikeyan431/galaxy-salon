<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy Admin Panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }
    
    /* Login Styles */
    .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-box { background: #16213e; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-box h1 { text-align: center; margin-bottom: 30px; color: #e94560; }
    .login-box input { width: 100%; padding: 14px; margin-bottom: 16px; border: 2px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #fff; font-size: 16px; }
    .login-box input:focus { outline: none; border-color: #e94560; }
    .login-box button { width: 100%; padding: 14px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .login-box button:hover { background: #ff6b6b; }
    .login-error { background: #ff4757; padding: 12px; border-radius: 8px; margin-bottom: 16px; display: none; }
    
    /* Dashboard Styles */
    .dashboard { display: none; }
    .dashboard.active { display: block; }
    
    /* Header */
    .admin-header { background: #16213e; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .admin-header h1 { color: #e94560; font-size: 20px; }
    .logout-btn { background: transparent; border: 2px solid #e94560; color: #e94560; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
    .logout-btn:hover { background: #e94560; color: #fff; }
    
    /* Nav */
    .admin-nav { background: #0f3460; padding: 0; display: flex; gap: 4px; flex-wrap: wrap; }
    .nav-btn { padding: 14px 24px; background: transparent; border: none; color: #fff; cursor: pointer; font-size: 14px; transition: 0.3s; }
    .nav-btn:hover { background: rgba(255,255,255,0.1); }
    .nav-btn.active { background: #e94560; }
    
    /* Content */
    .admin-content { padding: 24px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* Cards */
    .card { background: #16213e; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card h2 { margin-bottom: 20px; color: #e94560; font-size: 18px; }
    
    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; color: #aaa; font-size: 13px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #fff; font-size: 14px; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #e94560; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
    
    /* Buttons */
    .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-primary:hover { background: #ff6b6b; }
    .btn-secondary { background: #0f3460; color: #fff; }
    .btn-secondary:hover { background: #1a4a8a; }
    .btn-success { background: #2ed573; color: #fff; }
    .btn-success:hover { background: #7bed9f; }
    .btn-danger { background: #ff4757; color: #fff; }
    .btn-danger:hover { background: #ff6b81; }
    
    /* Courses Grid */
    .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
    .course-card { background: #0f3460; border-radius: 12px; overflow: hidden; }
    .course-card img { width: 100%; height: 160px; object-fit: cover; }
    .course-card-content { padding: 16px; }
    .course-card h3 { font-size: 16px; margin-bottom: 8px; }
    .course-card p { color: #aaa; font-size: 13px; margin-bottom: 12px; }
    .course-meta { display: flex; gap: 12px; font-size: 13px; color: #e94560; margin-bottom: 12px; }
    .course-actions { display: flex; gap: 8px; }
    .course-actions button { flex: 1; padding: 8px; font-size: 12px; }
    
    /* Modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal.active { display: flex; }
    .modal-content { background: #16213e; border-radius: 16px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 20px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { color: #e94560; }
    .modal-close { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 20px; border-top: 1px solid #0f3460; display: flex; gap: 12px; justify-content: flex-end; }
    
    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 16px 24px; border-radius: 8px; color: #fff; transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 300; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #2ed573; }
    .toast.error { background: #ff4757; }
    
    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #16213e; padding: 20px; border-radius: 12px; text-align: center; }
    .stat-card .number { font-size: 36px; color: #e94560; font-weight: 700; }
    .stat-card .label { color: #aaa; font-size: 14px; margin-top: 4px; }
    
    /* Image Upload */
    .image-preview { width: 100%; height: 150px; background: #0f3460; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #aaa; overflow: hidden; }
    .image-preview img { width: 100%; height: 100%; object-fit: cover; }
    
    /* Gallery */
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .gallery-item { position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-item .delete { position: absolute; top: 4px; right: 4px; background: #ff4757; color: #fff; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: 0.3s; }
    .gallery-item:hover .delete { opacity: 1; }
    .gallery-add { background: #0f3460; border: 2px dashed #e94560; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; min-height: 150px; color: #e94560; font-size: 40px; }
  </style>
</head>
<body>
  <!-- Login Page -->
  <div class="login-page" id="loginPage">
    <div class="login-box">
      <h1>🔐 Galaxy Admin</h1>
      <div class="login-error" id="loginError">Invalid password</div>
      <form id="loginForm">
        <input type="password" id="password" placeholder="Admin Password" required>
        <button type="submit">Login</button>
      </form>
      <p style="margin-top: 20px; text-align: center; color: #666; font-size: 12px;">
        Default password: galaxy2026
      </p>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <header class="admin-header">
      <h1>🔧 Galaxy Admin Panel</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>
    
    <nav class="admin-nav">
      <button class="nav-btn active" data-tab="overview">Overview</button>
      <button class="nav-btn" data-tab="siteinfo">Site Info</button>
      <button class="nav-btn" data-tab="courses">Courses</button>
      <button class="nav-btn" data-tab="founder">Founder</button>
      <button class="nav-btn" data-tab="settings">Settings</button>
    </nav>
    
    <div class="admin-content">
      <!-- Overview Tab -->
      <div class="tab-content active" id="overview">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="number" id="totalCourses">0</div>
            <div class="label">Total Courses</div>
          </div>
          <div class="stat-card">
            <div class="number" id="totalViews">0</div>
            <div class="label">Page Views</div>
          </div>
          <div class="stat-card">
            <div class="number" id="lastUpdate">-</div>
            <div class="label">Last Updated</div>
          </div>
        </div>
        
        <div class="card">
          <h2>Quick Actions</h2>
          <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <button class="btn btn-primary" onclick="showTab('courses')">+ Add Course</button>
            <button class="btn btn-secondary" onclick="showTab('siteinfo')">Edit Site Info</button>
            <button class="btn btn-success" onclick="saveAllChanges()">Save All Changes</button>
          </div>
        </div>
      </div>
      
      <!-- Site Info Tab -->
      <div class="tab-content" id="siteinfo">
        <div class="card">
          <h2>Website Information</h2>
          <form id="siteInfoForm">
            <div class="form-row">
              <div class="form-group">
                <label>Site Name</label>
                <input type="text" id="siteName" name="siteName">
              </div>
              <div class="form-group">
                <label>Tagline</label>
                <input type="text" id="siteTagline" name="siteTagline">
              </div>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea id="siteDescription" name="siteDescription"></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Phone</label>
                <input type="text" id="sitePhone" name="sitePhone">
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="siteEmail" name="siteEmail">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Instagram URL</label>
                <input type="url" id="siteInstagram" name="siteInstagram">
              </div>
              <div class="form-group">
                <label>WhatsApp URL</label>
                <input type="url" id="siteWhatsapp" name="siteWhatsapp">
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Save Site Info</button>
          </form>
        </div>
      </div>
      
      <!-- Courses Tab -->
      <div class="tab-content" id="courses">
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Courses Management</h2>
            <button class="btn btn-primary" onclick="openCourseModal()">+ Add Course</button>
          </div>
          <div class="courses-grid" id="coursesGrid">
            <!-- Courses will be loaded here -->
          </div>
        </div>
      </div>
      
      <!-- Founder Tab -->
      <div class="tab-content" id="founder">
        <div class="card">
          <h2>Founder Information</h2>
          <form id="founderForm">
            <div class="form-row">
              <div class="form-group">
                <label>Founder Name</label>
                <input type="text" id="founderName" name="founderName">
              </div>
              <div class="form-group">
                <label>Title</label>
                <input type="text" id="founderTitle" name="founderTitle">
              </div>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea id="founderDesc" name="founderDesc"></textarea>
            </div>
            <div class="form-group">
              <label>Profile Image</label>
              <input type="text" id="founderImage" name="founderImage" placeholder="images/ProfilePic.jpeg">
              <div class="image-preview" id="founderImagePreview">
                <span>Image Preview</span>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Save Founder Info</button>
          </form>
        </div>
      </div>
      
      <!-- Settings Tab -->
      <div class="tab-content" id="settings">
        <div class="card">
          <h2>Admin Settings</h2>
          <form id="passwordForm">
            <div class="form-group">
              <label>Change Admin Password</label>
              <input type="password" id="newPassword" placeholder="New Password">
            </div>
            <div class="form-group">
              <label>Confirm Password</label>
              <input type="password" id="confirmPassword" placeholder="Confirm Password">
            </div>
            <button type="submit" class="btn btn-primary">Update Password</button>
          </form>
        </div>
        <div class="card">
          <h2>Data Management</h2>
          <button class="btn btn-danger" onclick="resetData()">Reset All Data</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Course Modal -->
  <div class="modal" id="courseModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="courseModalTitle">Add Course</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="courseForm">
          <input type="hidden" id="courseId">
          <div class="form-group">
            <label>Course Title</label>
            <input type="text" id="courseTitle" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="courseDesc" required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Duration</label>
              <input type="text" id="courseDuration" placeholder="e.g., 3 Months">
            </div>
            <div class="form-group">
              <label>Price</label>
              <input type="text" id="coursePrice" placeholder="e.g., ₹25,000">
            </div>
          </div>
          <div class="form-group">
            <label>Level</label>
            <select id="courseLevel">
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
              <option value="Business">Business</option>
            </select>
          </div>
          <div class="form-group">
            <label>Image Path</label>
            <input type="text" id="courseImage" placeholder="images/course.jpg">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-success" onclick="saveCourse()">Save Course</button>
      </div>
    </div>
  </div>
  
  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // State
    let token = localStorage.getItem('adminToken');
    let contentData = null;
    const API_BASE = '/api';

    // Check auth on load
    if (token) {
      showDashboard();
      loadContent();
    }

    // Login
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        
        if (data.success) {
          token = data.token;
          localStorage.setItem('adminToken', token);
          showDashboard();
          loadContent();
        } else {
          document.getElementById('loginError').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('loginError').style.display = 'block';
      }
    };

    function showDashboard() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
    }

    function logout() {
      localStorage.removeItem('adminToken');
      location.reload();
    }

    // Load content from API
    async function loadContent() {
      try {
        const res = await fetch(`${API_BASE}/content`);
        contentData = await res.json();
        populateForms();
      } catch (err) {
        showToast('Error loading content', 'error');
      }
    }

    function populateForms() {
      // Stats
      document.getElementById('totalCourses').textContent = contentData.courses?.length || 0;
      document.getElementById('lastUpdate').textContent = contentData.lastUpdated ? new Date(contentData.lastUpdated).toLocaleDateString() : 'Never';

      // Site Info
      if (contentData.siteInfo) {
        document.getElementById('siteName').value = contentData.siteInfo.name || '';
        document.getElementById('siteTagline').value = contentData.siteInfo.tagline || '';
        document.getElementById('siteDescription').value = contentData.siteInfo.description || '';
        document.getElementById('sitePhone').value = contentData.siteInfo.phone || '';
        document.getElementById('siteEmail').value = contentData.siteInfo.email || '';
        document.getElementById('siteInstagram').value = contentData.siteInfo.instagram || '';
        document.getElementById('siteWhatsapp').value = contentData.siteInfo.whatsapp || '';
      }

      // Founder
      if (contentData.founder) {
        document.getElementById('founderName').value = contentData.founder.name || '';
        document.getElementById('founderTitle').value = contentData.founder.title || '';
        document.getElementById('founderDesc').value = contentData.founder.description || '';
        document.getElementById('founderImage').value = contentData.founder.image || '';
        if (contentData.founder.image) {
          document.getElementById('founderImagePreview').innerHTML = `<img src="${contentData.founder.image}" alt="Founder">`;
        }
      }

      // Courses
      renderCourses();
    }

    function renderCourses() {
      const grid = document.getElementById('coursesGrid');
      const courses = contentData.courses || [];
      
      grid.innerHTML = courses.map(course => `
        <div class="course-card">
          <img src="${course.image || 'images/placeholder.jpg'}" alt="${course.title}" onerror="this.src='https://placehold.co/400x300/e94560/fff?text=No+Image'">
          <div class="course-card-content">
            <h3>${course.title}</h3>
            <p>${course.description?.substring(0, 80)}...</p>
            <div class="course-meta">
              <span>${course.duration}</span>
              <span>${course.price}</span>
            </div>
            <div class="course-actions">
              <button class="btn btn-secondary" onclick="editCourse(${course.id})">Edit</button>
              <button class="btn btn-danger" onclick="deleteCourse(${course.id})">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Navigation
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.onclick = () => showTab(btn.dataset.tab);
    });

    function showTab(tab) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById(tab).classList.add('active');
    }

    // Site Info Form
    document.getElementById('siteInfoForm').onsubmit = async (e) => {
      e.preventDefault();
      const formData = {
        siteInfo: {
          name: document.getElementById('siteName').value,
          tagline: document.getElementById('siteTagline').value,
          description: document.getElementById('siteDescription').value,
          phone: document.getElementById('sitePhone').value,
          email: document.getElementById('siteEmail').value,
          instagram: document.getElementById('siteInstagram').value,
          whatsapp: document.getElementById('siteWhatsapp').value
        }
      };
      
      await saveContent(formData);
    };

    // Founder Form
    document.getElementById('founderForm').onsubmit = async (e) => {
      e.preventDefault();
      const formData = {
        founder: {
          name: document.getElementById('founderName').value,
          title: document.getElementById('founderTitle').value,
          description: document.getElementById('founderDesc').value,
          image: document.getElementById('founderImage').value
        }
      };
      
      await saveContent(formData);
    };

    // Course Modal
    function openCourseModal(courseId = null) {
      document.getElementById('courseModal').classList.add('active');
      document.getElementById('courseModalTitle').textContent = courseId ? 'Edit Course' : 'Add Course';
      
      if (courseId) {
        const course = contentData.courses.find(c => c.id === courseId);
        document.getElementById('courseId').value = course.id;
        document.getElementById('courseTitle').value = course.title;
        document.getElementById('courseDesc').value = course.description;
        document.getElementById('courseDuration').value = course.duration;
        document.getElementById('coursePrice').value = course.price;
        document.getElementById('courseLevel').value = course.level;
        document.getElementById('courseImage').value = course.image;
      } else {
        document.getElementById('courseForm').reset();
        document.getElementById('courseId').value = '';
      }
    }

    function closeModal() {
      document.getElementById('courseModal').classList.remove('active');
    }

    async function saveCourse() {
      const id = document.getElementById('courseId').value;
      const courseData = {
        title: document.getElementById('courseTitle').value,
        description: document.getElementById('courseDesc').value,
        duration: document.getElementById('courseDuration').value,
        price: document.getElementById('coursePrice').value,
        level: document.getElementById('courseLevel').value,
        image: document.getElementById('courseImage').value || 'images/placeholder.jpg'
      };

      try {
        const res = await fetch(`${API_BASE}/courses`, {
          method: id ? 'PUT' : 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(id ? { ...courseData, id: parseInt(id) } : courseData)
        });
        
        const data = await res.json();
        if (data.success) {
          showToast('Course saved successfully', 'success');
          closeModal();
          loadContent();
        }
      } catch (err) {
        showToast('Error saving course', 'error');
      }
    }

    function editCourse(id) {
      openCourseModal(id);
    }

    async function deleteCourse(id) {
      if (!confirm('Are you sure you want to delete this course?')) return;
      
      try {
        const res = await fetch(`${API_BASE}/courses`, {
          method: 'DELETE',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ id })
        });
        
        const data = await res.json();
        if (data.success) {
          showToast('Course deleted', 'success');
          loadContent();
        }
      } catch (err) {
        showToast('Error deleting course', 'error');
      }
    }

    // Save content helper
    async function saveContent(data) {
      try {
        const res = await fetch(`${API_BASE}/content`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(data)
        });
        
        const result = await res.json();
        if (result.success) {
          showToast('Saved successfully', 'success');
          loadContent();
        }
      } catch (err) {
        showToast('Error saving', 'error');
      }
    }

    async function saveAllChanges() {
      showToast('All changes saved', 'success');
    }

    function resetData() {
      if (confirm('Are you sure? This will reset all data!')) {
        showToast('Reset not implemented', 'error');
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Image preview
    document.getElementById('founderImage').onchange = (e) => {
      const preview = document.getElementById('founderImagePreview');
      preview.innerHTML = `<img src="${e.target.value}" alt="Preview" onerror="this.parentElement.innerHTML='<span>Image not found</span>'">`;
    };
  </script>
</body>
</html>
